# Frogbot: scan pull requests for new security issues before merge.
# Auth: OpenID Connect to JFrog (no JF_ACCESS_TOKEN secret). Set repo variables JF_URL and
# JF_OIDC_PROVIDER_NAME (Provider Name from Administration > Manage Integrations > OIDC).
# Optional: add oidc-audience under `with:` if your JFrog identity mapping requires it.
# Setup: https://docs.jfrog.com/security/docs/github-actions
# Template source: https://github.com/jfrog/frogbot/blob/master/.github/workflows/frogbot-scan-pull-request.yml

name: "Frogbot Scan Pull Request"

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    # Optional: require approval from users allowed to deploy to the "frogbot" GitHub Environment
    # before Frogbot runs (reduces risk with pull_request_target). Remove `environment:` if you want
    # every PR to scan without an environment gate.
    environment: frogbot
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frogbot scan
        uses: jfrog/frogbot@v2
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER_NAME }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
        env:
          JFROG_CLI_LOG_LEVEL: "DEBUG"
          # JFrog platform URL (requires Xray 3.29.0+)
          JF_URL: ${{ vars.JF_URL }}

          # JF_ACCESS_TOKEN omitted — obtained via OIDC when oidc-provider-name is set.

          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          JF_USE_CONFIG_PROFILE: "true"

          # Ensure node_modules exists for npm SCA (former frogbot-scan-pr-npm.yml behavior).
          # Prefer npm ci when package-lock.json is committed; use npm install for floating deps.
          JF_INSTALL_DEPS_CMD: npm install

          # [Optional, default: https://api.github.com]
          # JF_GIT_API_ENDPOINT: https://github.example.com

          # [Optional] Air-gapped / proxy: remote generic repo pointing at https://releases.jfrog.io
          # JF_RELEASES_REPO: ""

          # [Optional] SMTP for email when secrets are detected (set secrets + receivers if used)
          # JF_SMTP_SERVER: ${{ secrets.JF_SMTP_SERVER }}
          # JF_SMTP_USER: ${{ secrets.JF_SMTP_USER }}
          # JF_SMTP_PASSWORD: ${{ secrets.JF_SMTP_PASSWORD }}
          # JF_EMAIL_RECEIVERS: "security@example.com"

          ##########################################################################
          ## If you use .frogbot/frogbot-config.yml, many knobs can live there.   ##
          ##########################################################################

          # [Optional, default: "."]
          # JF_WORKING_DIR: path/to/project/dir

          # [Optional] Comma-separated Xray Watches
          # JF_WATCHES: <watch-1>,<watch-2>

          # [Optional] JFrog Project key
          # JF_PROJECT: <project-key>

          # [Optional, default: "FALSE"] Set "TRUE" to list all existing vulns on the PR (pre-sales demos)
          # JF_INCLUDE_ALL_VULNERABILITIES: "TRUE"

          # [Optional, default: "FALSE"] Keep previous Frogbot PR comments
          # JF_AVOID_PREVIOUS_PR_COMMENTS_DELETION: "TRUE"

          # [Optional, default: "TRUE"] Fail the job when issues are found
          # JF_FAIL: "FALSE"

          # [Optional] Virtual repository in Artifactory for dependency resolution
          # JF_DEPS_REPO: ""

          # [Optional, default: "FALSE"] Single PR with all dependency fixes
          # JF_GIT_AGGREGATE_FIXES: "TRUE"

          # [Optional, default: "FALSE"]
          # JF_FIXABLE_ONLY: "TRUE"

          # [Optional] Low | Medium | High | Critical
          # JF_MIN_SEVERITY: ""
